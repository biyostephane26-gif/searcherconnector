name: CI/CD - Build & Deploy (DISABLED)

# Temporairement désactivé - Vercel déploie directement
on:
  workflow_dispatch: # Manuel seulement

jobs:
  # ────────────────────────────────────────────────────
  # JOB 1: Vérifier que tout compile et build correctement
  # ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # - name: 🔍 TypeScript check
      #   run: npx tsc --noEmit --skipLibCheck
      #   continue-on-error: false

      - name: 🏗️ Build Next.js
        run: npm run build
        env:
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # MongoDB
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          # Redis
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
          # Email
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Stripe
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
          # Build config
          SKIP_ENV_VALIDATION: true
          NODE_ENV: production
          # Skip static generation
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_SKIP_STATIC_GENERATION: true


  # ────────────────────────────────────────────────────
  # JOB 2: Déployer sur Vercel (seulement si build OK)
  # ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: build-and-test  # Attend que le build soit OK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          vercel-version: 'latest'

      - name: ✅ Déploiement terminé!
        run: echo "🎉 App déployée sur Vercel!"
