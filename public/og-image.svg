<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fond -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Grille de fond subtile -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Lueur dorée gauche -->
  <circle cx="200" cy="315" r="300" fill="#D4AF37" opacity="0.04"/>

  <!-- Logo icône à gauche -->
  <circle cx="200" cy="315" r="120" stroke="#D4AF37" stroke-width="10" fill="none" opacity="0.2"/>
  <circle cx="200" cy="315" r="80"  stroke="#D4AF37" stroke-width="7"  fill="none" opacity="0.5"/>
  <circle cx="200" cy="315" r="46"  fill="#D4AF37"/>
  <text x="200" y="336" font-family="Georgia, serif" font-size="48" font-weight="900"
        fill="#0A0A0A" text-anchor="middle">S</text>

  <!-- Points du logo -->
  <circle cx="200" cy="195" r="7" fill="#D4AF37"/>
  <circle cx="320" cy="315" r="7" fill="#D4AF37"/>
  <circle cx="200" cy="435" r="7" fill="#D4AF37"/>
  <circle cx="80"  cy="315" r="7" fill="#D4AF37"/>

  <!-- Ligne séparatrice verticale -->
  <line x1="390" y1="140" x2="390" y2="490" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Texte principal -->
  <text x="460" y="270" font-family="'Arial Black', Arial, sans-serif" font-size="72"
        font-weight="900" fill="#FFFFFF" letter-spacing="-2">SEARCHER</text>
  <text x="460" y="350" font-family="'Arial Black', Arial, sans-serif" font-size="72"
        font-weight="900" fill="#D4AF37" letter-spacing="-2">CONNECTOR</text>

  <!-- Sous-titre -->
  <text x="460" y="415" font-family="Arial, sans-serif" font-size="28"
        fill="#888888" letter-spacing="1">L'agent IA qui travaille pour vous 24h/24</text>

  <!-- Badges -->
  <rect x="460" y="445" width="120" height="34" rx="17" fill="#D4AF37" opacity="0.15"/>
  <text x="520" y="467" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#D4AF37" text-anchor="middle" letter-spacing="2">EMPLOI</text>

  <rect x="595" y="445" width="140" height="34" rx="17" fill="#D4AF37" opacity="0.15"/>
  <text x="665" y="467" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#D4AF37" text-anchor="middle" letter-spacing="2">FREELANCE</text>

  <rect x="750" y="445" width="190" height="34" rx="17" fill="#D4AF37" opacity="0.15"/>
  <text x="845" y="467" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#D4AF37" text-anchor="middle" letter-spacing="2">INVESTISSEMENT</text>

  <!-- URL en bas -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="20"
        fill="#444444" text-anchor="middle" letter-spacing="3">searcherconnector.com</text>
</svg>
