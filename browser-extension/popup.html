<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Searcher Connector</title>
  <style>
    body { width: 280px; font-family: system-ui, sans-serif; background: #0A0A0A; color: #fff; margin: 0; padding: 16px; }
    h1 { font-size: 14px; margin: 0 0 12px; color: #D4AF37; }
    p { font-size: 11px; color: #888; line-height: 1.5; margin: 0 0 12px; }
    input { width: 100%; box-sizing: border-box; background: #111; border: 1px solid #2a2a2a; color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; margin-bottom: 8px; }
    button { width: 100%; background: #D4AF37; color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .status { font-size: 11px; margin-top: 8px; text-align: center; }
    .ok { color: #4ade80; }
    .off { color: #f87171; }
  </style>
</head>
<body>
  <h1>Searcher Connector</h1>
  <p>Colle ton token perso (Paramètres → Extension navigateur dans l'app) pour connecter l'extension à ton compte.</p>
  <input id="token" type="text" placeholder="sc_ext_..." />
  <button id="save">Connecter</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
